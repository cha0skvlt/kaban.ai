# KABAN AI — production compose (pre-built images from GHCR)
# Requires Docker only — no Python, no make.
#
#   curl -fsSLO https://raw.githubusercontent.com/cha0skvlt/kaban.ai/v1.1/.env.example
#   curl -fsSLO https://github.com/cha0skvlt/kaban.ai/releases/download/v1.1/docker-compose.release.yml
#   docker compose -f docker-compose.release.yml up -d
#
# Images: https://github.com/cha0skvlt/kaban.ai/pkgs/container/kaban.ai

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: kaban
      POSTGRES_USER: kaban
      POSTGRES_PASSWORD: kaban
    volumes:
      - kaban-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kaban -d kaban"]
      interval: 2s
      timeout: 2s
      retries: 30

  backend:
    image: ghcr.io/cha0skvlt/kaban.ai:1.1-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy

  nginx:
    image: ghcr.io/cha0skvlt/kaban.ai:1.1-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  kaban-postgres-data:
