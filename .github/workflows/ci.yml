name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: kaban_test
          POSTGRES_USER: kaban
          POSTGRES_PASSWORD: kaban
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U kaban -d kaban_test"
          --health-interval=2s
          --health-timeout=2s
          --health-retries=30
    env:
      DATABASE_URL: postgresql://kaban:kaban@localhost:5432/kaban_test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            test/requirements.txt

      - name: Install dependencies
        run: make install

      - name: Lint
        run: make lint

      - name: Tests with coverage
        run: make test-cov
